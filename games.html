<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Games – Game Reviews</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 8px; }
    nav { margin-bottom: 20px; }
    nav a { margin-right: 15px; color: #0066cc; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
    th { background: #333; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #ddd; vertical-align: top; }
    tr:hover { background: #f0f0f0; }
    form { background: white; padding: 20px; margin-top: 20px; border: 1px solid #ddd; border-radius: 4px; }
    form h2 { margin-top: 0; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; }
    button { margin-top: 15px; padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 3px; cursor: pointer; }
    button:hover { background: #0052a3; }
    .btn-delete { background: #cc0000; margin-left: 8px; padding: 5px 10px; margin-top: 0; }
    .btn-edit   { background: #ff8800; padding: 5px 10px; margin-top: 0; }
    .btn-cancel { background: #666; padding: 8px 16px; margin-left: 10px; }
    .msg { padding: 10px; margin: 10px 0; border-radius: 3px; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .chip { display: inline-block; background: #e8f0fe; color: #0066cc; border-radius: 12px; padding: 2px 8px; font-size: 0.78em; margin: 2px 2px 0 0; }
    .chip-platform { background: #fff3e0; color: #e65100; }
    #search-bar { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; font-size: 1em; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    .table-header span { color: #666; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>🎮 Games</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="reviews.html">Reviews</a>
    <a href="platforms.html">Platforms</a>
    <a href="genres.html">Genres</a>
    <a href="tags.html">Tags</a>
    <a href="game_tags.html">Game Tags</a>
    <a href="game_genres.html">Game Genres</a>
    <a href="game_platforms.html">Game Platforms</a>
  </nav>

  <div id="msg" class="msg" style="display:none"></div>

  <div class="table-header">
    <h2 style="margin:0">All Games</h2>
    <span id="game-count"></span>
  </div>
  <input type="text" id="search-bar" placeholder="Search games by title..." oninput="filterTable()"/>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Release Year</th>
        <th>Genres</th>
        <th>Platforms</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table-body"><tr><td colspan="6">Loading...</td></tr></tbody>
  </table>

  <form id="game-form">
    <h2 id="form-heading">Add New Game</h2>
    <input type="hidden" id="edit-id"/>

    <label for="title">Game Title *</label>
    <input type="text" id="title" placeholder="e.g. The Legend of Zelda" required/>

    <label for="release-year">Release Year</label>
    <input type="number" id="release-year" placeholder="e.g. 2023" min="1970" max="2030"/>

    <div>
      <button type="button" onclick="submitForm()">Save Game</button>
      <button type="button" class="btn-cancel" id="cancel-btn" onclick="cancelEdit()" style="display:none">Cancel</button>
    </div>
  </form>

  <script>
    const URL = 'https://nkwvpmmawauulkprgsjs.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rd3ZwbW1hd2F1dWxrcHJnc2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzA2MzEsImV4cCI6MjA5MTI0NjYzMX0.Q6EyWN99O2HKdZsO4QsN208Nn6sGCdVFBqMrCc33Gzc';
    const H = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

    let allRows = [];

    async function loadGames() {
      const [gamesRes, gameGenresRes, genresRes, gamePlatformsRes, platformsRes] = await Promise.all([
        fetch(URL + '/rest/v1/games?select=*&order=id.asc', { headers: H }),
        fetch(URL + '/rest/v1/game_genres?select=*', { headers: H }),
        fetch(URL + '/rest/v1/genres?select=*', { headers: H }),
        fetch(URL + '/rest/v1/game_platforms?select=*', { headers: H }),
        fetch(URL + '/rest/v1/platforms?select=*', { headers: H }),
      ]);

      const [games, gameGenres, genres, gamePlatforms, platforms] = await Promise.all([
        gamesRes.json(), gameGenresRes.json(), genresRes.json(),
        gamePlatformsRes.json(), platformsRes.json()
      ]);

      const genreMap    = Object.fromEntries(genres.map(g => [g.id, g.name]));
      const platformMap = Object.fromEntries(platforms.map(p => [p.id, p.name]));

      const genresByGame    = {};
      const platformsByGame = {};
      for (const gg of gameGenres) {
        if (!genresByGame[gg.game_id]) genresByGame[gg.game_id] = [];
        genresByGame[gg.game_id].push(genreMap[gg.genre_id] || '?');
      }
      for (const gp of gamePlatforms) {
        if (!platformsByGame[gp.game_id]) platformsByGame[gp.game_id] = [];
        platformsByGame[gp.game_id].push(platformMap[gp.platform_id] || '?');
      }

      allRows = games.map(g => ({
        id: g.id,
        title: g.title,
        release_year: g.release_year,
        genreNames:    genresByGame[g.id]    || [],
        platformNames: platformsByGame[g.id] || []
      }));

      document.getElementById('game-count').textContent = `${allRows.length} game${allRows.length !== 1 ? 's' : ''}`;
      renderTable(allRows);
    }

    function renderTable(rows) {
      const tbody = document.getElementById('table-body');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6">No games found.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(g => {
        const genreChips    = g.genreNames.map(n    => `<span class="chip">${n}</span>`).join('') || '<span style="color:#999">—</span>';
        const platformChips = g.platformNames.map(n => `<span class="chip chip-platform">${n}</span>`).join('') || '<span style="color:#999">—</span>';
        return `<tr>
          <td>${g.id}</td>
          <td><strong>${esc(g.title)}</strong></td>
          <td>${g.release_year || '—'}</td>
          <td>${genreChips}</td>
          <td>${platformChips}</td>
          <td>
            <button class="btn-edit"   onclick="editGame(${g.id},'${esc(g.title)}',${g.release_year || ''})">Edit</button>
            <button class="btn-delete" onclick="deleteGame(${g.id})">Delete</button>
          </td>
        </tr>`;
      }).join('');
    }

    function filterTable() {
      const q = document.getElementById('search-bar').value.toLowerCase();
      renderTable(allRows.filter(g => g.title.toLowerCase().includes(q)));
    }

    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,"&#39;"); }

    async function submitForm() {
      const id          = document.getElementById('edit-id').value;
      const title       = document.getElementById('title').value.trim();
      const releaseYear = document.getElementById('release-year').value;

      if (!title) { alert('Game title is required.'); return; }

      const body = JSON.stringify({
        title,
        release_year: releaseYear ? parseInt(releaseYear) : null
      });

      if (id) {
        await fetch(URL + '/rest/v1/games?id=eq.' + id, { method: 'PATCH', headers: H, body });
        showMsg('Game updated successfully!');
      } else {
        await fetch(URL + '/rest/v1/games', { method: 'POST', headers: H, body });
        showMsg('Game added successfully!');
      }
      cancelEdit();
      loadGames();
    }

    async function deleteGame(id) {
      if (!confirm('Delete this game? This will also remove all its reviews, genre, platform and tag assignments.')) return;
      await fetch(URL + '/rest/v1/games?id=eq.' + id, { method: 'DELETE', headers: H });
      showMsg('Game deleted.');
      loadGames();
    }

    function editGame(id, title, releaseYear) {
      document.getElementById('edit-id').value       = id;
      document.getElementById('title').value         = title;
      document.getElementById('release-year').value  = releaseYear || '';
      document.getElementById('form-heading').textContent = 'Edit Game';
      document.getElementById('cancel-btn').style.display = 'inline';
      document.getElementById('game-form').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      document.getElementById('edit-id').value      = '';
      document.getElementById('title').value        = '';
      document.getElementById('release-year').value = '';
      document.getElementById('form-heading').textContent = 'Add New Game';
      document.getElementById('cancel-btn').style.display = 'none';
    }

    function showMsg(text) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.style.display = 'block';
      setTimeout(() => m.style.display = 'none', 3000);
    }

    loadGames();
  </script>
</body>
</html>
